<VirtualHost *:80>
        ServerAdmin etomasayala@gmail.com
        ServerName vp.local
        ServerAlias vplocal
        DocumentRoot "/var/www/html/viapacifico/backend/web"
        ErrorLog "/var/www/html/logs/vp-error.log"
        CustomLog "/var/www/html/logs/vp-access.log" common env=!dontlog
        LogFormat "%{X-Forwarded-For}i %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
        SetEnvIf Request_URI "^/check\.txt$" dontlog
        <Directory "/var/www/html/viapacifico/backend/web">
                AllowOverride All
                Require all granted
                Allow from all
                Options Indexes FollowSymLinks
        </Directory>
</VirtualHost>

